services:
  postgres:
    image: postgres:15
    container_name: lexflow-postgres
    restart: always
    environment:
      POSTGRES_DB: lexflow
      POSTGRES_USER: lexflow
      POSTGRES_PASSWORD: lexflow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
